site_name: MolScope
site_description: Lightweight molecular structure analysis, visualization, graph export, and coarse-graining in Python.
repo_url: https://github.com/roshan2004/molscope
repo_name: roshan2004/molscope

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - User Guide:
      - Coordinate formats compared: user-guide/coordinate-formats.md
      - Reading molecular files: user-guide/reading-files.md
      - Selections: user-guide/selections.md
      - Geometry and measurements: user-guide/geometry.md
      - Contact maps and distance matrices: user-guide/contact-maps.md
      - Protein analysis: user-guide/protein-analysis.md
      - Plotting and viewing: user-guide/plotting.md
      - Ensemble analysis: user-guide/ensembles.md
      - Molecular graphs: user-guide/molecular-graphs.md
      - Chemical perception: user-guide/chemical-perception.md
      - Structural descriptors: user-guide/descriptors.md
      - Coarse-graining: user-guide/coarse-graining.md
  - Examples:
      - Overview: examples/index.md
      - Molecular geometry tour: examples/geometry-tour.md
      - Compare NMR models: examples/compare-nmr-models.md
      - Build a molecular graph: examples/build-molecular-graph.md
      - PDB to graph and CG beads: examples/pdb-to-graph-cg.md
      - PDB to PyG ML toy model: examples/pdb-to-pyg-ml.md
      - Coarse-grain a protein: examples/coarse-grain-protein.md
      - Export to PyTorch Geometric: examples/export-pyg.md
      - Analyze contacts: examples/analyze-contacts.md
      - Ligand binding site: examples/binding-site.md
  - API reference: api-reference.md
  - Benchmarks: benchmarks.md
  - Limitations and validation: limitations.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
