name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

  extras-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: ["graph", "cif", "chem"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install package extra
        run: uv sync --python 3.11 --extra ${{ matrix.extra }}

      - name: Smoke import
        run: uv run python -c "import molscope as ms; print(ms.__version__)"
