name: Publish to PyPI

# Publishes to PyPI via trusted publishing (OIDC) whenever a GitHub Release
# is published. No API token is stored: PyPI verifies the workflow's identity.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi          # matches the environment named in the PyPI trusted publisher
    permissions:
      id-token: write          # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        # --check-url makes re-runs idempotent: already-uploaded files are
        # skipped instead of failing the job with "File already exists".
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/
