# Read the Docs build configuration for MolScope.
# Schema: https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# The docs are pure mkdocs Markdown and do not import the molscope package,
# so only the docs requirements are installed — keeps builds fast.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

mkdocs:
  configuration: mkdocs.yml
  # Match the local `mkdocs build --strict` we run in development.
  fail_on_warning: true

python:
  install:
    - requirements: docs/requirements.txt
