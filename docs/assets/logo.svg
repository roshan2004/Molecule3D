<svg xmlns="http://www.w3.org/2000/svg" width="1254" height="1254" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">MolScope logo</title>
  <desc id="desc">Clean vector recreation of the MolScope molecular magnifying-glass logo.</desc>
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F3A4A"/>
      <stop offset="1" stop-color="#0F2433"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#62B6A8"/>
      <stop offset="1" stop-color="#2C7A78"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8BCFC3"/>
      <stop offset="1" stop-color="#5BA9A0"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0F2433" flood-opacity="0.12"/>
    </filter>
    <style>
      .bond{stroke:url(#navy);stroke-width:13;stroke-linecap:round;}
      .bond-teal{stroke:url(#teal);stroke-width:13;stroke-linecap:round;}
      .atom-navy{fill:url(#navy);}
      .atom-teal{fill:url(#teal);}
      .shine{fill:#ffffff;opacity:.45;}
      .word{font-family:Inter, Avenir Next, Segoe UI, Arial, sans-serif;font-weight:800;letter-spacing:-3px;}
    </style>
  </defs>

  <!-- Main magnifying glass -->
  <g filter="url(#softShadow)">
    <circle cx="668" cy="442" r="214" fill="none" stroke="url(#navy)" stroke-width="31"/>
    <line x1="817" y1="601" x2="998" y2="782" stroke="url(#navy)" stroke-width="58" stroke-linecap="round"/>
    <line x1="802" y1="586" x2="834" y2="618" stroke="url(#teal)" stroke-width="14" stroke-linecap="round"/>
    <path d="M667 250 C755 258 827 323 850 410" fill="none" stroke="url(#cyan)" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
  </g>

  <!-- Molecule inside the lens -->
  <g filter="url(#softShadow)">
    <line class="bond" x1="643" y1="463" x2="572" y2="532"/>
    <line class="bond" x1="643" y1="463" x2="561" y2="351"/>
    <line class="bond" x1="643" y1="463" x2="761" y2="407"/>
    <line class="bond" x1="643" y1="463" x2="707" y2="558"/>
    <circle class="atom-navy" cx="643" cy="463" r="39"/>
    <circle class="atom-teal" cx="561" cy="351" r="35"/>
    <circle class="atom-teal" cx="761" cy="407" r="35"/>
    <circle class="atom-teal" cx="548" cy="541" r="32"/>
    <circle class="atom-navy" cx="721" cy="566" r="29"/>
    <circle class="shine" cx="626" cy="446" r="10"/>
    <circle class="shine" cx="545" cy="333" r="9"/>
    <circle class="shine" cx="746" cy="392" r="9"/>
    <circle class="shine" cx="532" cy="525" r="8"/>
    <circle class="shine" cx="706" cy="552" r="7"/>
  </g>

  <!-- Molecule extending to the left -->
  <g filter="url(#softShadow)">
    <line class="bond" x1="411" y1="386" x2="310" y2="381"/>
    <line class="bond-teal" x1="411" y1="386" x2="427" y2="293"/>
    <line class="bond" x1="411" y1="386" x2="372" y2="501"/>
    <line class="bond" x1="372" y1="501" x2="288" y2="528"/>
    <line class="bond" x1="372" y1="501" x2="433" y2="579"/>
    <line class="bond-teal" x1="433" y1="579" x2="390" y2="656"/>
    <line class="bond-teal" x1="390" y1="656" x2="500" y2="683"/>
    <line class="bond" x1="500" y1="683" x2="563" y2="737"/>
    <line class="bond" x1="433" y1="579" x2="500" y2="547"/>

    <circle class="atom-navy" cx="411" cy="386" r="28"/>
    <circle class="atom-navy" cx="310" cy="381" r="20"/>
    <circle class="atom-teal" cx="427" cy="293" r="29"/>
    <circle class="atom-navy" cx="372" cy="501" r="20"/>
    <circle class="atom-navy" cx="288" cy="528" r="20"/>
    <circle class="atom-navy" cx="433" cy="579" r="19"/>
    <circle class="atom-teal" cx="390" cy="656" r="33"/>
    <circle class="atom-navy" cx="500" cy="683" r="20"/>
    <circle class="atom-navy" cx="563" cy="737" r="18"/>
    <circle class="shine" cx="398" cy="372" r="7"/>
    <circle class="shine" cx="301" cy="371" r="6"/>
    <circle class="shine" cx="415" cy="281" r="7"/>
    <circle class="shine" cx="281" cy="518" r="6"/>
    <circle class="shine" cx="379" cy="640" r="8"/>
    <circle class="shine" cx="554" cy="728" r="5"/>
  </g>

  <!-- Wordmark: unified single-word lockup -->
  <g aria-label="MolScope">
    <text x="158" y="948" class="word" font-size="154">
      <tspan fill="url(#navy)">Mol</tspan><tspan fill="url(#teal)">Scope</tspan>
    </text>
  </g>
</svg>
